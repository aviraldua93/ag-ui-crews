<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1033"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="streamLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
      @keyframes dash-flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } }
      @keyframes dash-flow-r { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 24; } }
      @keyframes float-y { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
      @keyframes float-y2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(6px); } }
      @keyframes scale-pulse { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
      @keyframes ripple { 0% { r: 8; opacity: 0.6; } 100% { r: 28; opacity: 0; } }
      @keyframes scan { 0% { transform: translateY(-200px); opacity: 0; } 10% { opacity: 0.15; } 90% { opacity: 0.15; } 100% { transform: translateY(200px); opacity: 0; } }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes particle-up { 0% { transform: translateY(0) scale(1); opacity: 0.8; } 100% { transform: translateY(-60px) scale(0); opacity: 0; } }
      @keyframes glow-breathe { 0%,100% { filter: drop-shadow(0 0 4px #3b82f6); } 50% { filter: drop-shadow(0 0 12px #06b6d4); } }
      @keyframes stream-particle { 0% { transform: translateX(0); opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translateX(180px); opacity: 0; } }
      @keyframes data-scroll { 0% { transform: translateY(0); } 100% { transform: translateY(-12px); } }
      .scan-line { animation: scan 4.5s ease-in-out infinite; }
      .pulse1 { animation: pulse 2s ease-in-out infinite; }
      .pulse2 { animation: pulse 2s ease-in-out 0.5s infinite; }
      .pulse3 { animation: pulse 2s ease-in-out 1s infinite; }
      .pulse4 { animation: pulse 2s ease-in-out 1.5s infinite; }
      .flow-in { stroke-dasharray: 8 16; animation: dash-flow 1.5s linear infinite; }
      .flow-out { stroke-dasharray: 8 16; animation: dash-flow-r 1.5s linear infinite; }
      .float1 { animation: float-y 3s ease-in-out infinite; }
      .float2 { animation: float-y2 3.5s ease-in-out 0.3s infinite; }
      .float3 { animation: float-y 4s ease-in-out 0.7s infinite; }
      .float4 { animation: float-y2 3s ease-in-out 1s infinite; }
      .dash-glow { animation: glow-breathe 3s ease-in-out infinite; }
      .blink-cursor { animation: blink 1s step-end infinite; }
      .ripple1 { animation: ripple 2.5s ease-out infinite; }
      .ripple2 { animation: ripple 2.5s ease-out 0.8s infinite; }
      .stream1 { animation: stream-particle 2s linear infinite; }
      .stream2 { animation: stream-particle 2s linear 0.4s infinite; }
      .stream3 { animation: stream-particle 2s linear 0.8s infinite; }
      .stream4 { animation: stream-particle 2s linear 1.2s infinite; }
      .stream5 { animation: stream-particle 2s linear 1.6s infinite; }
      .particle { animation: particle-up 2s ease-out infinite; }
      .p2 { animation: particle-up 2.5s ease-out 0.4s infinite; }
      .p3 { animation: particle-up 1.8s ease-out 0.9s infinite; }
      .p4 { animation: particle-up 2.2s ease-out 1.3s infinite; }
      .p5 { animation: particle-up 2.8s ease-out 0.2s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Scanning line -->
  <rect class="scan-line" x="0" y="195" width="800" height="10" fill="url(#streamLine)" opacity="0.12"/>

  <!-- Corner decorations -->
  <path d="M 20 50 L 20 20 L 50 20" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <path d="M 750 20 L 780 20 L 780 50" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <path d="M 20 350 L 20 380 L 50 380" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <path d="M 750 380 L 780 380 L 780 350" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="900" letter-spacing="4" fill="url(#titleGrad)" filter="url(#glow)">AG-UI CREWS</text>
  <text x="400" y="68" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#94a3b8" letter-spacing="1">Real-Time Dashboard for A2A Agent Crews</text>

  <!-- Server node (left) -->
  <g class="float1">
    <rect x="60" y="165" width="70" height="45" rx="8" fill="#0a0a1a" stroke="#22c55e" stroke-width="1.5" filter="url(#glow)"/>
    <text x="95" y="183" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#22c55e">SERVER</text>
    <text x="95" y="198" text-anchor="middle" font-family="monospace" font-size="6" fill="#64748b">a2a host</text>
    <!-- Server blinking light -->
    <circle cx="75" cy="175" r="2" fill="#22c55e" class="pulse1"/>
  </g>

  <!-- SSE stream particles flowing from server to dashboard -->
  <line class="flow-in" x1="132" y1="188" x2="280" y2="188" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <line class="flow-in" x1="132" y1="178" x2="280" y2="160" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <line class="flow-in" x1="132" y1="198" x2="280" y2="215" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>

  <!-- SSE event particles -->
  <circle class="stream1" cx="145" cy="188" r="2" fill="#06b6d4" filter="url(#glow)"/>
  <circle class="stream2" cx="145" cy="185" r="1.5" fill="#22c55e"/>
  <circle class="stream3" cx="145" cy="191" r="1.5" fill="#3b82f6"/>
  <circle class="stream4" cx="145" cy="183" r="1" fill="#06b6d4"/>
  <circle class="stream5" cx="145" cy="193" r="1" fill="#22c55e"/>

  <!-- Central dashboard screen -->
  <g class="dash-glow">
    <rect x="280" y="110" width="240" height="155" rx="10" fill="url(#dashGrad)" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Dashboard title bar -->
    <rect x="280" y="110" width="240" height="18" rx="10" fill="#111827"/>
    <rect x="280" y="120" width="240" height="8" fill="#111827"/>
    <circle cx="293" cy="120" r="3" fill="#ef4444"/>
    <circle cx="304" cy="120" r="3" fill="#f59e0b"/>
    <circle cx="315" cy="120" r="3" fill="#22c55e"/>
    <text x="400" y="123" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">ag-ui dashboard</text>

    <!-- Mini org chart inside dashboard -->
    <circle cx="330" cy="155" r="5" fill="#0a0a1a" stroke="#3b82f6" stroke-width="1" class="pulse1"/>
    <text x="330" y="157" text-anchor="middle" font-family="monospace" font-size="4" fill="#3b82f6">L</text>
    <line x1="330" y1="160" x2="315" y2="175" stroke="#3b82f6" stroke-width="0.5" opacity="0.5"/>
    <line x1="330" y1="160" x2="345" y2="175" stroke="#3b82f6" stroke-width="0.5" opacity="0.5"/>
    <circle cx="315" cy="178" r="4" fill="#0a0a1a" stroke="#06b6d4" stroke-width="0.8" class="pulse2"/>
    <circle cx="345" cy="178" r="4" fill="#0a0a1a" stroke="#06b6d4" stroke-width="0.8" class="pulse3"/>
    <text x="330" y="195" text-anchor="middle" font-family="monospace" font-size="5" fill="#475569">crew</text>

    <!-- Mini message stream -->
    <rect x="365" y="140" width="60" height="55" rx="3" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.5"/>
    <text x="395" y="150" text-anchor="middle" font-family="monospace" font-size="5" fill="#475569">messages</text>
    <rect x="370" y="155" width="50" height="5" rx="1" fill="#3b82f6" opacity="0.4" class="pulse1"/>
    <rect x="370" y="163" width="35" height="5" rx="1" fill="#06b6d4" opacity="0.4" class="pulse2"/>
    <rect x="370" y="171" width="45" height="5" rx="1" fill="#22c55e" opacity="0.4" class="pulse3"/>
    <rect x="370" y="179" width="28" height="5" rx="1" fill="#3b82f6" opacity="0.4" class="pulse4"/>
    <rect x="370" y="187" width="40" height="5" rx="1" fill="#06b6d4" opacity="0.3" class="pulse1"/>

    <!-- Mini task board -->
    <rect x="435" y="140" width="70" height="55" rx="3" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.5"/>
    <text x="470" y="150" text-anchor="middle" font-family="monospace" font-size="5" fill="#475569">tasks</text>
    <!-- Task columns -->
    <text x="448" y="159" text-anchor="middle" font-family="monospace" font-size="4" fill="#f59e0b">TODO</text>
    <text x="470" y="159" text-anchor="middle" font-family="monospace" font-size="4" fill="#3b82f6">WIP</text>
    <text x="492" y="159" text-anchor="middle" font-family="monospace" font-size="4" fill="#22c55e">DONE</text>
    <rect x="441" y="163" width="14" height="8" rx="1" fill="#f59e0b" opacity="0.3" class="pulse2"/>
    <rect x="441" y="174" width="14" height="8" rx="1" fill="#f59e0b" opacity="0.2" class="pulse3"/>
    <rect x="463" y="163" width="14" height="8" rx="1" fill="#3b82f6" opacity="0.3" class="pulse1"/>
    <rect x="485" y="163" width="14" height="8" rx="1" fill="#22c55e" opacity="0.3" class="pulse4"/>
    <rect x="485" y="174" width="14" height="8" rx="1" fill="#22c55e" opacity="0.2" class="pulse2"/>
    <rect x="485" y="185" width="14" height="8" rx="1" fill="#22c55e" opacity="0.15" class="pulse1"/>

    <!-- Live indicator -->
    <circle cx="295" cy="253" r="3" fill="#ef4444" class="pulse1"/>
    <text x="305" y="256" font-family="monospace" font-size="7" fill="#ef4444" class="pulse2">LIVE</text>
    <!-- Metrics inside dashboard bottom -->
    <text x="370" y="255" font-family="monospace" font-size="6" fill="#64748b">agents:</text>
    <text x="400" y="255" font-family="monospace" font-size="6" fill="#22c55e" class="pulse1">4</text>
    <text x="425" y="255" font-family="monospace" font-size="6" fill="#64748b">events/s:</text>
    <text x="463" y="255" font-family="monospace" font-size="6" fill="#06b6d4" class="pulse3">127</text>
    <text x="490" y="255" font-family="monospace" font-size="6" fill="#64748b">uptime:</text>
    <text x="510" y="255" font-family="monospace" font-size="6" fill="#3b82f6" class="pulse2">2h</text>
  </g>
  <!-- Ripple around dashboard -->
  <circle class="ripple1" cx="400" cy="188" r="8" fill="none" stroke="#3b82f6" stroke-width="0.8"/>
  <circle class="ripple2" cx="400" cy="188" r="8" fill="none" stroke="#06b6d4" stroke-width="0.8"/>

  <!-- React component nodes floating around dashboard -->
  <g class="float2">
    <rect x="540" y="120" width="55" height="22" rx="4" fill="#0a0a1a" stroke="#3b82f6" stroke-width="1" filter="url(#glow)"/>
    <text x="567" y="134" text-anchor="middle" font-family="monospace" font-size="6" fill="#3b82f6">&lt;Crew/&gt;</text>
  </g>
  <g class="float3">
    <rect x="555" y="165" width="55" height="22" rx="4" fill="#0a0a1a" stroke="#06b6d4" stroke-width="1" filter="url(#glow)"/>
    <text x="582" y="179" text-anchor="middle" font-family="monospace" font-size="6" fill="#06b6d4">&lt;Feed/&gt;</text>
  </g>
  <g class="float4">
    <rect x="545" y="210" width="62" height="22" rx="4" fill="#0a0a1a" stroke="#22c55e" stroke-width="1" filter="url(#glow)"/>
    <text x="576" y="224" text-anchor="middle" font-family="monospace" font-size="6" fill="#22c55e">&lt;Tasks/&gt;</text>
  </g>

  <!-- Connection lines from components to dashboard -->
  <line class="flow-out" x1="540" y1="131" x2="520" y2="145" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  <line class="flow-out" x1="555" y1="176" x2="520" y2="185" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line class="flow-out" x1="545" y1="221" x2="520" y2="215" stroke="#22c55e" stroke-width="0.8" opacity="0.4"/>

  <!-- Mini event-stream panel (left bottom) -->
  <g class="float2">
    <rect x="40" y="268" width="190" height="90" rx="6" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>
    <circle cx="53" cy="279" r="3.5" fill="#ef4444"/>
    <circle cx="64" cy="279" r="3.5" fill="#f59e0b"/>
    <circle cx="75" cy="279" r="3.5" fill="#22c55e"/>
    <text x="135" y="282" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">sse events</text>
    <line x1="40" y1="288" x2="230" y2="288" stroke="#1e293b" stroke-width="0.5"/>
    <text x="50" y="301" font-family="monospace" font-size="7" fill="#06b6d4" class="pulse1">event: agent.status</text>
    <text x="50" y="313" font-family="monospace" font-size="7" fill="#3b82f6" class="pulse2">event: task.complete</text>
    <text x="50" y="325" font-family="monospace" font-size="7" fill="#22c55e" class="pulse3">event: crew.update</text>
    <text x="50" y="337" font-family="monospace" font-size="7" fill="#06b6d4" class="pulse4">event: msg.stream</text>
    <text x="50" y="349" font-family="monospace" font-size="7" fill="#3b82f6" class="pulse1">event: metric.push</text>
    <rect class="blink-cursor" x="160" y="341" width="4" height="8" fill="#06b6d4" opacity="0.7"/>
  </g>

  <!-- Mini component tree (right bottom) -->
  <g class="float3">
    <rect x="570" y="268" width="190" height="90" rx="6" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>
    <circle cx="583" cy="279" r="3.5" fill="#ef4444"/>
    <circle cx="594" cy="279" r="3.5" fill="#f59e0b"/>
    <circle cx="605" cy="279" r="3.5" fill="#22c55e"/>
    <text x="665" y="282" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">component tree</text>
    <line x1="570" y1="288" x2="760" y2="288" stroke="#1e293b" stroke-width="0.5"/>
    <text x="580" y="301" font-family="monospace" font-size="7.5" fill="#3b82f6">&lt;App&gt;</text>
    <text x="590" y="313" font-family="monospace" font-size="7.5" fill="#06b6d4" class="pulse1">├─ &lt;CrewGrid/&gt;</text>
    <text x="590" y="325" font-family="monospace" font-size="7.5" fill="#06b6d4" class="pulse2">├─ &lt;EventFeed/&gt;</text>
    <text x="590" y="337" font-family="monospace" font-size="7.5" fill="#06b6d4" class="pulse3">├─ &lt;TaskBoard/&gt;</text>
    <text x="590" y="349" font-family="monospace" font-size="7.5" fill="#22c55e" class="pulse4">└─ &lt;Metrics/&gt;</text>
  </g>

  <!-- Rising particles -->
  <circle class="particle" cx="300" cy="280" r="1.5" fill="#3b82f6"/>
  <circle class="p2" cx="400" cy="275" r="1" fill="#06b6d4"/>
  <circle class="p3" cx="500" cy="280" r="1.5" fill="#22c55e"/>
  <circle class="p4" cx="250" cy="270" r="1" fill="#3b82f6"/>
  <circle class="p5" cx="550" cy="265" r="1.2" fill="#06b6d4"/>
  <circle class="particle" cx="350" cy="290" r="1" fill="#22c55e"/>
  <circle class="p3" cx="450" cy="285" r="1.2" fill="#3b82f6"/>

  <!-- Status bar -->
  <rect x="0" y="375" width="800" height="25" fill="#080818" opacity="0.9"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="#1e293b" stroke-width="0.5"/>
  <circle cx="20" cy="388" r="3" fill="#22c55e" class="pulse1"/>
  <text x="30" y="391" font-family="'Courier New',monospace" font-size="9" fill="#64748b">ag-ui protocol · server-sent events · react · live</text>
  <text x="760" y="391" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#475569">v0.1.0</text>
</svg>